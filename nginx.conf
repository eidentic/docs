server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Long-cache for hashed static assets (Docusaurus content-hashes filenames)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Do not cache HTML (may change on deploy)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Homepage: advertise discovery resources (agent-readiness) + Markdown
    # content negotiation. Browsers (Accept: text/html) get HTML as usual;
    # agents sending Accept: text/markdown get /index.md.
    location = / {
        add_header Link '<https://docs.eidentic.dev/sitemap.xml>; rel="sitemap", <https://docs.eidentic.dev/llms.txt>; rel="llms-txt", <https://eidentic.dev>; rel="service-meta"; type="text/html", </index.md>; rel="alternate"; type="text/markdown"' always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires -1;
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /index.md last;
        }
        try_files /index.html =404;
    }

    # Discovery files change on deploy — keep their edge cache short so updates
    # propagate fast (robots.txt was getting stuck on Cloudflare's default TTL).
    location ~* ^/(robots\.txt|sitemap\.xml|llms(-full)?\.txt)$ {
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # Serve Markdown files (/index.md, SKILL.md) with the correct type.
    location ~* \.md$ {
        default_type text/markdown;
        charset utf-8;
        try_files $uri =404;
    }

    # Well-known discovery files are real files only — never the SPA fallback,
    # so a missing one returns a clean 404 instead of 200 HTML.
    location /.well-known/ {
        try_files $uri =404;
    }

    # Clean URLs — try file, then directory, then index.html (SPA fallback)
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html /index.html;
    }

    # 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
